<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食安小尖兵 - 究極完整版</title>
    
    <link rel="apple-touch-icon" id="apple-icon" href="">
    <link rel="manifest" id="manifest-link">

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background: #56ab2f;
            color: #333;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #eee;
            z-index: 10;
        }

        .stat-box {
            background: #e9ecef;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
        }
        .stat-box.score { color: #E76F51; }
        .stat-box.time { color: #2A9D8F; }

        /* 當進入最後五秒時，時間會變紅閃爍 */
        .time-warning { color: #D62828 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #play-area {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: #fdfdfd;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: background-color 0.3s;
        }

        /* 衝刺期的背景變色 */
        .sprint-mode { background-color: #fff0f0 !important; }

        #tray {
            height: 100px;
            background: linear-gradient(to bottom, #d4d4d4, #a0a0a0);
            border-top: 12px solid #8d99ae;
            border-radius: 30px 30px 0 0; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1), inset 0 15px 15px -15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            position: relative;
        }
        #tray::before {
            content: "🍽️ 合格食材盛裝區 🍽️";
            font-size: 24px;
            font-weight: 900;
            color: #444;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.7);
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 25px;
            border-radius: 15px;
            border: 2px dashed #888;
        }

        .food-item {
            position: absolute;
            font-size: 65px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            z-index: 2;
            touch-action: none;
        }
        .food-item:active { transform: scale(0.9); }

        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 32px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 20;
            white-space: nowrap;
        }

        /* 特殊的螢幕置中大字提示 */
        .center-warning {
            font-size: 48px !important;
            text-shadow: 2px 2px 10px #fff, -2px -2px 10px #fff;
            animation: floatUpCenter 1.5s ease-out forwards !important;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }

        @keyframes floatUpCenter {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; }
        }

        .danger-flash { background: #ffe6e6 !important; }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .overlay.hidden { display: none; }

        .overlay h1 { color: #2A9D8F; font-size: 48px; margin-bottom: 10px; }
        .overlay p { font-size: 24px; font-weight: bold; line-height: 1.5; color: #444; margin-bottom: 20px; }

        .btn {
            background: #E76F51;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 5px 10px rgba(231,111,81,0.3);
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        .rules-icons { display: flex; gap: 20px; margin-bottom: 20px; width: 90%; justify-content: center; }
        .rule-item { display: flex; flex-direction: column; align-items: center; background: #f4f4f4; padding: 15px 10px; border-radius: 15px; width: 45%; }
        .rule-emoji { font-size: 38px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; line-height: 1.2; margin-bottom: 10px; }
        .rule-text { font-size: 20px; font-weight: bold; background: white; padding: 5px 10px; border-radius: 10px; width: 90%; }

        .score-board { background: #f8f9fa; border: 3px dashed #ccc; border-radius: 20px; padding: 20px 40px; margin: 20px 0; width: 80%; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div class="stat-box score">🛡️ <span id="score-display">0</span></div>
        <div class="stat-box time" id="time-box">⏱️ <span id="time-display">30</span></div>
    </div>

    <div id="play-area"></div>
    <div id="tray"></div>

    <div id="start-screen" class="overlay">
        <h1>食安小尖兵</h1>
        <p><span style="color:#E76F51;">點擊消滅</span>「黑心食品」<br>讓「合格食材」掉入盤中！</p>
        
        <div class="rules-icons">
            <div class="rule-item" style="border: 3px solid #E76F51;">
                <div class="rule-emoji">🦠 🧪 🤢 🪰 ☠️ 🐛</div>
                <div class="rule-text" style="color: #E76F51;">點擊擊碎 (+10)</div>
            </div>
            <div class="rule-item" style="border: 3px solid #2A9D8F;">
                <div class="rule-emoji">🍎 🥬 🥩 🐟 🥛 🌽 🍊</div>
                <div class="rule-text" style="color: #2A9D8F;">放過它 (+5)</div>
            </div>
        </div>
        
        <button id="btn-start" class="btn">開始把關</button>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1 id="end-title">稽查結束</h1>
        <p id="end-message" style="color: #555;">評語</p>
        
        <div class="score-board">
            <div style="font-size: 24px; color: #555; margin-bottom: 10px;">本次總積分</div>
            <div style="font-size: 65px; color: #E76F51; font-weight: bold;" id="final-score">0</div>
            <div style="font-size: 22px; color: #888; margin-top: 15px; font-weight: bold;">
                ( 本局最高滿分：<span id="max-score">0</span> )
            </div>
        </div>

        <button id="btn-restart" class="btn">再挑戰一次</button>
    </div>
</div>

<script>
    // === 動態生成高品質專屬 APP 圖示 (黃金防護盾+放大鏡+打勾) ===
    const customIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <defs>
            <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a8e063"/><stop offset="100%" stop-color="#2A9D8F"/>
            </linearGradient>
            <linearGradient id="shG" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFD166"/><stop offset="100%" stop-color="#E76F51"/>
            </linearGradient>
            <filter id="sd">
                <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#004A3F" flood-opacity="0.4"/>
            </filter>
        </defs>
        <rect width="512" height="512" rx="100" fill="url(#bgG)"/>
        <path d="M 256 70 C 256 70 390 100 410 120 C 410 270 345 380 256 440 C 167 380 102 270 102 120 C 122 100 256 70 256 70 Z" fill="url(#shG)" filter="url(#sd)"/>
        <path d="M 256 100 C 256 100 360 125 375 140 C 375 255 320 345 256 395 C 192 345 137 255 137 140 C 152 125 256 100 256 100 Z" fill="#FFF" opacity="0.95"/>
        <line x1="320" y1="320" x2="410" y2="410" stroke="#333" stroke-width="36" stroke-linecap="round" filter="url(#sd)"/>
        <circle cx="256" cy="230" r="85" fill="#E0FBFC" stroke="#333" stroke-width="26"/>
        <path d="M 205 240 L 235 270 L 305 190" fill="none" stroke="#2A9D8F" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
    
    // 將 SVG 轉為 Data URL 套用到網頁的圖示與安裝檔中
    const iconUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(customIconSVG);
    document.getElementById('apple-icon').href = iconUrl;
    
    const manifest = {
        "name": "食安小尖兵",
        "short_name": "食安小尖兵",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#ffffff",
        "theme_color": "#56ab2f",
        "icons": [{"src": iconUrl, "sizes": "512x512", "type": "image/svg+xml"}]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    document.getElementById('manifest-link').href = URL.createObjectURL(blob);
    // ========================================================

    const GOOD_FOODS = ['🍎', '🥬', '🥩', '🐟', '🥛', '🌽', '🍊'];
    const BAD_FOODS  = ['🦠', '🧪', '🤢', '🪰', '☠️', '🐛'];
    
    let score = 0;
    let maxPossibleScore = 0; 
    let timeLeft = 30;
    let gameInterval;
    let spawnerInterval;
    let isPlaying = false;
    let foods = [];

    const playArea = document.getElementById('play-area');
    const scoreDisplay = document.getElementById('score-display');
    const timeDisplay = document.getElementById('time-display');
    const timeBox = document.getElementById('time-box');
    const startScreen = document.getElementById('start-screen');
    const endScreen = document.getElementById('end-screen');
    const finalScoreDisplay = document.getElementById('final-score');
    const maxScoreDisplay = document.getElementById('max-score');
    const endTitle = document.getElementById('end-title');
    const endMessage = document.getElementById('end-message');

    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-restart').addEventListener('click', showStartScreen);

    function showStartScreen() {
        endScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
        playArea.innerHTML = '';
        foods = [];
        playArea.classList.remove('sprint-mode');
        timeBox.classList.remove('time-warning');
    }

    function startGame() {
        startScreen.classList.add('hidden');
        endScreen.classList.add('hidden');
        score = 0; maxPossibleScore = 0; timeLeft = 30; foods = [];
        playArea.innerHTML = '';
        playArea.classList.remove('sprint-mode');
        timeBox.classList.remove('time-warning');
        updateUI();
        isPlaying = true;
        
        gameInterval = setInterval(() => {
            timeLeft--; 
            updateUI();

            // === 衝刺期觸發邏輯 ===
            if (timeLeft === 5) {
                showCenterWarning('🔥極限衝刺🔥');
                timeBox.classList.add('time-warning');
                playArea.classList.add('sprint-mode');
            }

            if (timeLeft <= 0) endGame();
        }, 1000);

        spawnFood();
        requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        scoreDisplay.innerText = score;
        timeDisplay.innerText = timeLeft;
    }

    function spawnFood() {
        if (!isPlaying) return;

        const isBad = Math.random() > 0.6;
        const emojiList = isBad ? BAD_FOODS : GOOD_FOODS;
        const emoji = emojiList[Math.floor(Math.random() * emojiList.length)];
        
        const el = document.createElement('div');
        el.className = 'food-item';
        el.innerText = emoji;
        
        const maxX = playArea.clientWidth - 80;
        el.style.left = Math.floor(Math.random() * maxX) + 'px';
        el.style.top = '-80px';
        
        // === 速度計算邏輯 ===
        let speedMultiplier = 1 + ((30 - timeLeft) / 30) * 1.2; 
        let nextSpawnTime = Math.max(300, 700 - (30 - timeLeft) * 15);

        // 如果進入最後 5 秒衝刺期
        if (timeLeft <= 5) {
            speedMultiplier = 2.5; // 強制 2.5 倍速狂降
            nextSpawnTime = Math.max(100, Math.random() * 200); // 生成間隔縮短
        }

        const speed = (3 + Math.random() * 3) * speedMultiplier;

        el.addEventListener('pointerdown', function(e) {
            e.preventDefault(); 
            handleTap(el, isBad);
        });

        playArea.appendChild(el);
        foods.push({ el: el, yPos: -80, speed: speed, isBad: isBad, active: true });

        spawnerInterval = setTimeout(spawnFood, nextSpawnTime + Math.random() * 100);
    }

    function handleTap(el, isBad) {
        if (!isPlaying || !el.parentNode) return;

        const rect = el.getBoundingClientRect();
        const playAreaRect = playArea.getBoundingClientRect();
        const x = rect.left - playAreaRect.left + 40;
        const y = rect.top - playAreaRect.top + 40;

        if (isBad) {
            score += 10; maxPossibleScore += 10;
            showFloatingText(x, y, '+10', '#E76F51');
        } else {
            score -= 10; maxPossibleScore += 5;
            showFloatingText(x, y, '-10', '#555');
        }

        updateUI();
        removeFood(el);
    }

    function gameLoop() {
        if (!isPlaying) return;
        const bottomLimit = playArea.clientHeight;

        for (let i = foods.length - 1; i >= 0; i--) {
            const food = foods[i];
            if (!food.active) continue;

            food.yPos += food.speed;
            food.el.style.top = food.yPos + 'px';

            if (food.yPos > bottomLimit - 50) {
                if (food.isBad) {
                    score -= 5; maxPossibleScore += 10;
                    playArea.classList.add('danger-flash');
                    setTimeout(() => { playArea.classList.remove('danger-flash'); }, 300);
                    showFloatingText(food.el.offsetLeft + 40, bottomLimit - 70, '漏掉了!', '#D62828');
                } else {
                    score += 5; maxPossibleScore += 5;
                    showFloatingText(food.el.offsetLeft + 40, bottomLimit - 70, '+5', '#2A9D8F');
                }
                updateUI();
                removeFood(food.el);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    function removeFood(el) {
        for (let i = 0; i < foods.length; i++) {
            if (foods[i].el === el) {
                foods[i].active = false;
                foods.splice(i, 1);
                if (el.parentNode) el.parentNode.removeChild(el);
                break;
            }
        }
    }

    function showFloatingText(x, y, text, color) {
        const el = document.createElement('div');
        el.className = 'floating-text'; 
        el.innerText = text; 
        el.style.left = x + 'px'; 
        el.style.top = y + 'px'; 
        el.style.color = color;
        playArea.appendChild(el);
        setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 800);
    }

    function showCenterWarning(text) {
        const el = document.createElement('div');
        el.className = 'floating-text center-warning'; 
        el.innerText = text; 
        el.style.left = '50%'; 
        el.style.top = '50%'; 
        el.style.color = '#D62828';
        playArea.appendChild(el);
        setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 1500);
    }

    function endGame() {
        isPlaying = false;
        clearInterval(gameInterval); clearTimeout(spawnerInterval);
        endScreen.classList.remove('hidden');
        finalScoreDisplay.innerText = score;
        maxScoreDisplay.innerText = maxPossibleScore;

        let ratio = 0;
        if (maxPossibleScore > 0) {
             ratio = score / maxPossibleScore;
        }

        if (ratio >= 0.8) {
            endTitle.innerText = "🌟 廉能食安之星 🌟"; endTitle.style.color = "#E9C46A";
            endMessage.innerText = "眼明手快！成功守護餐桌安全！";
        } else if (ratio >= 0.4) {
            endTitle.innerText = "👍 稱職的稽查員"; endTitle.style.color = "#2A9D8F";
            endMessage.innerText = "表現不錯！但別讓黑心食材溜走囉！";
        } else {
            endTitle.innerText = "🚨 食安大危機 🚨"; endTitle.style.color = "#E76F51";
            endMessage.innerText = "漏掉太多了，趕快再挑戰一次！";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食安小尖兵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            color: #333;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .stat-box {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-box.score { color: #E76F51; }
        .stat-box.time { color: #2A9D8F; }

        #play-area {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #tray {
            height: 80px;
            background: linear-gradient(to bottom, #e0e0e0, #bdbdbd);
            border-top: 8px solid #8d99ae;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: #555;
            letter-spacing: 2px;
            z-index: 5;
        }

        .food-item {
            position: absolute;
            font-size: 65px; /* 為長輩放大的圖案 */
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            z-index: 2;
        }

        .food-item:active { transform: scale(0.9); }
        .food-item.bad { filter: drop-shadow(0 0 10px rgba(231, 111, 81, 0.8)); }

        .floating-text {
            position: absolute;
            font-weight: 900;
            font-size: 32px; /* 為長輩放大的加減分提示 */
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 20;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }

        .danger-flash { animation: flashRed 0.5s ease-out; }
        @keyframes flashRed {
            0% { box-shadow: inset 0 0 0 0 rgba(231, 111, 81, 0); }
            50% { box-shadow: inset 0 0 50px 20px rgba(231, 111, 81, 0.8); }
            100% { box-shadow: inset 0 0 0 0 rgba(231, 111, 81, 0); }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .overlay.hidden { display: none; }

        .overlay h1 {
            color: #2A9D8F;
            font-size: 48px; /* 放大標題 */
            margin-bottom: 15px;
            text-shadow: 2px 2px 0px #e0e0e0;
        }

        .overlay p {
            font-size: 24px; /* 放大說明文字 */
            font-weight: bold;
            line-height: 1.5;
            color: #444;
            margin-bottom: 30px;
        }

        .btn {
            background: #E76F51;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 28px; /* 放大按鈕文字 */
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(231, 111, 81, 0.4);
            margin-top: 10px;
        }
        .btn:active { transform: translateY(3px); }

        .rules-icons {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        .rule-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .rule-emoji { font-size: 65px; }
        .rule-text {
            font-size: 22px;
            font-weight: 900;
            margin-top: 10px;
            background: white;
            padding: 5px 15px;
            border-radius: 10px;
        }

        .score-board {
            background: #f8f9fa;
            border: 3px dashed #ccc;
            border-radius: 2

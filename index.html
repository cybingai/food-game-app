<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食安小尖兵 - 究極完整版</title>
    
    <link rel="apple-touch-icon" id="apple-icon" href="">
    <link rel="manifest" id="manifest-link">

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background: #56ab2f;
            color: #333;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #eee;
            z-index: 10;
        }

        .stat-box {
            background: #e9ecef;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
        }
        .stat-box.score { color: #E76F51; }
        .stat-box.time { color: #2A9D8F; }

        /* 當進入最後五秒時，時間會變紅閃爍 */
        .time-warning { color: #D62828 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #play-area {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: #fdfdfd;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: background-color 0.3s;
        }

        /* 衝刺期的背景變色 */
        .sprint-mode { background-color: #fff0f0 !important; }

        #tray {
            height: 100px;
            background: linear-gradient(to bottom, #d4d4d4, #a0a0a0);
            border-top: 12px solid #8d99ae;
            border-radius: 30px 30px 0 0; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1), inset 0 15px 15px -15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            position: relative;
        }
        #tray::before {
            content: "🍽️ 合格食材盛裝區 🍽️";
            font-size: 24px;
            font-weight: 900;
            color: #444;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.7);
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 25px;
            border-radius: 15px;
            border: 2px dashed #888;
        }

        .food-item {
            position: absolute;
            font-size: 65px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            z-index: 2;
            touch-action: none;
        }
        .food-item:active { transform: scale(0.9); }

        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 32px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 20;
            white-space: nowrap;
        }

        /* 特殊的螢幕置中大字提示 */
        .center-warning {
            font-size: 48px !important;
            text-shadow: 2px 2px 10px #fff, -2px -2px 10px #fff;
            animation: floatUpCenter 1.5s ease-out forwards !important;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }

        @keyframes floatUpCenter {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; }
        }

        .danger-flash { background: #ffe6e6 !important; }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .overlay.hidden { display: none; }

        .overlay h1 { color: #2A9D8F; font-size: 48px; margin-bottom: 10px; }
